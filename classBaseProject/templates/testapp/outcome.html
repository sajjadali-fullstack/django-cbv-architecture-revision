<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Info | Premium Registry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #111111;
            font-family: sans-serif;
            color: #ffffff;
        }

        .profile-card {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .accent-gold {
            color: #c5a880;
            font-weight: 600;
        }

        .badge-roll {
            background-color: #2e3d30;
            color: #a3cfbb;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        small{
            color: white !important;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 style="color: #c5a880; font-weight: 400; letter-spacing: 1px;">Institutional Registry</h1>
            <p class="text small">Verified Student Matrix Profile</p>
        </div>

        <div class="profile-card p-4 shadow-lg">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="m-0" style="font-weight: 400;">Personnel Data</h4>
                <span class="badge-roll">ID: #{{rollno}}</span>
            </div>
            <hr style="border-color: #2a2a2a;">
            <div class="mb-3">
                <small class="text d-block text-uppercase" style="font-size: 0.75rem; letter-spacing: 1px;">Full Name</small>
                <span class="fs-5 accent-gold">{{name}}</span>
            </div>
            <div>
                <small class="text d-block text-uppercase"
                    style="font-size: 0.75rem; letter-spacing: 1px; margin-top:20px;">Rollno</small>
                <span class="fs-5 text-white-50">{{rollno}}</span>
            </div>
            <div>
                <small class="text d-block text-uppercase"
                    style="font-size: 0.75rem; letter-spacing: 1px; margin-top:20px">Enrolled Course</small>
                <span class="fs-5 text-white-50">{{course}}</span>
            </div>
        </div>
    </div>
</body>

</html>
